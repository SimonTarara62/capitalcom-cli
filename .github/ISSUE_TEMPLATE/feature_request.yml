name: Feature request
description: Suggest a new command, flag, or capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed command or behavior
      placeholder: "e.g. capctl market list-top --asset-class CRYPTO"
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
