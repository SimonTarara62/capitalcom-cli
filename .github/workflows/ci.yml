name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check capital_cli tests
      - name: Type-check (mypy)
        run: mypy capital_cli
      - name: Test (offline suite)
        run: pytest -q
      - name: CLI reference is up to date
        run: |
          typer capital_cli.cli.app utils docs --name capctl --output docs/CLI.md
          git diff --exit-code docs/CLI.md
