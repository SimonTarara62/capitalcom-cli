name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: python -m ruff check capital_cli tests
      - name: Type-check (mypy)
        run: python -m mypy capital_cli
      - name: Test (offline suite)
        run: python -m pytest -q
      - name: CLI reference is up to date
        if: runner.os == 'Linux'
        run: |
          python -m typer capital_cli.cli.app utils docs --name capctl --output docs/CLI.md
          git diff --exit-code docs/CLI.md
